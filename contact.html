<section>

<h2 class="typewriter">Me Contacter</h2>

<div class="contact-container">

<form action="https://formspree.io/f/xyknnolo" method="POST" class="contact-form">
  <div class="form-group">
    <label for="name">Nom</label>
    <input type="text" id="name" name="name" required placeholder="Votre nom">
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="Votre email">
  </div>

  <div class="form-group">
    <label for="subject">Sujet</label>
    <input type="text" id="subject" name="subject" required placeholder="Sujet de votre message">
  </div>

  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" required placeholder="Votre message..."></textarea>
  </div>

  <button type="submit">Envoyer le message</button>
</form>

<div class="contact-info-card">

<h3>Autres moyens de me contacter</h3>

<div class="contact-item">
<span>Email</span>
<a href="mailto:tristan.momha@outlook.fr">tristan.momha@outlook.fr</a>
</div>

<div class="contact-item">
<span>GitHub</span>
<a href="https://github.com/TristanM-ort" target="_blank" rel="noopener noreferrer">github.com/TristanM-ort</a>
</div>
